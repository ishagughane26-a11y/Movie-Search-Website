<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MovieFinder</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#000;
      color:white;
      min-height:100vh;
      padding:40px;
    }

    .container{
      max-width:1200px;
      margin:auto;
    }

    h1{
      text-align:center;
      font-size:50px;
      margin-bottom:10px;
    }

    .subtitle{
      text-align:center;
      color:#bdbdbd;
      margin-bottom:40px;
    }

    .search-box{
      background:#1b1b1b;
      padding:15px 20px;
      border-radius:12px;
      margin-bottom:40px;
    }

    .search-box input{
      width:100%;
      background:transparent;
      border:none;
      outline:none;
      color:white;
      font-size:18px;
    }

    .movies{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    }

    .card{
      background:#1b1b1b;
      border-radius:20px;
      overflow:hidden;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .card img{
      width:100%;
      height:350px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
    }

    .card-content h2{
      font-size:24px;
      margin-bottom:10px;
    }

    .year{
      color:#bdbdbd;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>MovieFinder</h1>

    <p class="subtitle">
      Discover Amazing Movies & TV Shows
    </p>

    <div class="search-box">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search movies..."
      />
    </div>

    <div class="movies" id="movieContainer"></div>

  </div>

  <script>
    const movies = [
      {
        title: "Avengers Endgame",
        year: "2019",
        image: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1200&auto=format&fit=crop"
      },
      {
        title: "Inception",
        year: "2010",
        image: "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=1200&auto=format&fit=crop"
      },
      {
        title: "Interstellar",
        year: "2014",
        image: "https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=1200&auto=format&fit=crop"
      },
      {
        title: "Joker",
        year: "2019",
        image: "https://images.unsplash.com/photo-1513106580091-1d82408b8cd6?q=80&w=1200&auto=format&fit=crop"
      }
    ];

    const movieContainer = document.getElementById("movieContainer");
    const searchInput = document.getElementById("searchInput");

    function displayMovies(movieList){
      movieContainer.innerHTML = "";

      movieList.forEach(movie => {
        movieContainer.innerHTML += `
          <div class="card">
            <img src="${movie.image}" alt="${movie.title}">
            
            <div class="card-content">
              <h2>${movie.title}</h2>
              <p class="year">Release Year: ${movie.year}</p>
            </div>
          </div>
        `;
      });
    }

    displayMovies(movies);

    searchInput.addEventListener("keyup", () => {

      const searchValue = searchInput.value.toLowerCase();

      const filteredMovies = movies.filter(movie =>
        movie.title.toLowerCase().includes(searchValue)
      );

      displayMovies(filteredMovies);
    });
  </script>

</body>
</html>
